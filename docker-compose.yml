version: '3.8'

services:
  hermes-storage:
    build: .
    container_name: hermes-storage-app
    restart: unless-stopped
    ports:
      - "8900:8000"
    volumes:
      # 关键：将群晖共享文件夹01/物品存储 挂载到容器的 /data/物品存储
      # 请根据实际路径修改左侧的宿主机路径
      - /volume1/群晖共享文件夹01/物品存储:/data/物品存储
    environment:
      - TZ=Asia/Shanghai
      - STORAGE_ROOT=/data/物品存储
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
